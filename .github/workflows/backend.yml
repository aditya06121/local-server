name: Backend CI/CD

on:
  push:
    branches: [main]
    paths:
      - "server/**"

jobs:
  deploy-backend:
    runs-on: self-hosted

    defaults:
      run:
        working-directory: server

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: server/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Build TypeScript
        run: npm run build

      - name: Prepare directories
        run: mkdir -p $HOME/apps/fullstack-app/server

      - name: Deploy backend
        run: rsync -av --delete ./ $HOME/apps/fullstack-app/server/

      - name: Install production dependencies
        run: |
          cd $HOME/apps/fullstack-app/server
          npm ci --omit=dev

      - name: Restart backend
        run: sudo systemctl restart app
